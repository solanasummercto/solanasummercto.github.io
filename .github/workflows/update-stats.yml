name: Update live stats

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:            # allow manual runs from the Actions tab
  push:
    paths:
      - "scripts/update-stats.mjs"
      - ".github/workflows/update-stats.yml"

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build stats.json
        env:
          # Optional: set an RPC_URL secret for a private/faster RPC. Falls back to public.
          RPC_URL: ${{ secrets.RPC_URL }}
        run: node scripts/update-stats.mjs

      - name: Commit if changed
        run: |
          git config user.name "summer-stats-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/stats.json data/events.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh live stats [skip ci]"
            git push
          else
            echo "No change in stats."
          fi
